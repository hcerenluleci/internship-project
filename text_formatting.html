<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Text Formatting Guide</title>
  </head>
  <body>
    <!-- Text Formatting Tags Reference for the Project -->
    <p>
      This is <b>bold</b> text.
      <!-- Makes text bold -->
    </p>
    <p>
      This is <i>italic</i> text.
      <!-- Makes text italic -->
    </p>
    <p>
      This is <big>big</big> text.
      <!-- Increases font size -->
    </p>
    <p>
      This is <small>small</small> text.
      <!-- Decreases font size -->
    </p>
    <p>
      This is <sub>subscript</sub> text.
      <!-- Places text slightly below the baseline -->
    </p>
    <p>
      This is <sup>superscript</sup> text.
      <!-- Places text slightly above the baseline -->
    </p>
    <p>
      This is <ins>inserted</ins> text.
      <!-- Underlines text -->
    </p>
    <p>
      This is <del>deleted</del> text.
      <!-- Strikethrough effect -->
    </p>
    <p>
      This is <mark>marked</mark> text.
      <!-- Highlights text with a background color -->
    </p>
  </body>
</html>
