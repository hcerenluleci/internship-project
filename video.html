<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Kawaii Video Project</title>
  </head>
  <body>
    <!-- Main video component for the project -->
    <!-- 'controls' enables user playback options -->
    <!-- 'autoplay', 'muted', and 'loop' are set for a continuous background experience -->
    <video width="640" height="360" controls autoplay muted loop>
      <source src="catvid.mp4" type="video/mp4" />
      Your browser does not support the video element.
    </video>
  </body>
</html>
